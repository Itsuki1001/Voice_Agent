<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pete's Inn — Voice Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0e0e0e; --surface:#161616; --border:#2a2a2a;
      --gold:#c9a84c; --gold-dim:#7a6130; --text:#e8e0d0;
      --muted:#6b6358; --you:#4a9eff; --bot:#c9a84c;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
    header { width:100%; padding:2rem 3rem; border-bottom:1px solid var(--border); }
    header h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.6rem; letter-spacing:.08em; color:var(--gold); }
    header span { font-size:.75rem; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; }
    main { width:100%; max-width:760px; flex:1; display:flex; flex-direction:column; padding:2rem 1.5rem; gap:1.5rem; }
    #conversation { flex:1; display:flex; flex-direction:column; gap:1.2rem; min-height:300px; max-height:60vh; overflow-y:auto; }
    #conversation::-webkit-scrollbar { width:3px; }
    #conversation::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .msg { display:flex; flex-direction:column; gap:.3rem; animation:fadeUp .3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-label { font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; }
    .msg.you .msg-label { color:var(--you); }
    .msg.bot .msg-label { color:var(--bot); }
    .msg-text { font-size:1rem; line-height:1.65; }
    .msg.you .msg-text { color:#a8c8ff; }
    #interim { font-size:.9rem; color:var(--muted); font-style:italic; min-height:1.4rem; }
    #status-bar { display:flex; align-items:center; gap:.8rem; font-size:.78rem; color:var(--muted); }
    #status-dot { width:8px; height:8px; border-radius:50%; background:var(--muted); transition:background .3s; }
    #status-dot.listening { background:var(--you); box-shadow:0 0 8px var(--you); animation:pulse 1.5s infinite; }
    #status-dot.thinking  { background:var(--gold); box-shadow:0 0 8px var(--gold); }
    #status-dot.speaking  { background:#4ecb71; box-shadow:0 0 8px #4ecb71; animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #controls { display:flex; justify-content:center; padding:1rem 0 2rem; }
    #mic-btn { width:72px; height:72px; border-radius:50%; border:1.5px solid var(--gold-dim); background:var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .25s ease; position:relative; }
    #mic-btn:hover { border-color:var(--gold); transform:scale(1.05); }
    #mic-btn.active { border-color:var(--you); background:#0a1a2e; box-shadow:0 0 24px rgba(74,158,255,.25); }
    #mic-btn svg { width:26px; height:26px; }
    #mic-btn .ring { position:absolute; inset:-8px; border-radius:50%; border:1px solid var(--you); opacity:0; }
    #mic-btn.active .ring { opacity:.4; animation:ring-pulse 2s infinite; }
    @keyframes ring-pulse { 0%{transform:scale(1);opacity:.4} 100%{transform:scale(1.3);opacity:0} }
    #waveform { width:100%; height:48px; }
  </style>
</head>
<body>
<header>
  <h1>Pete's Inn</h1>
  <span>Voice Assistant</span>
</header>
<main>
  <div id="conversation">
    <div class="msg bot">
      <div class="msg-label">Assistant</div>
      <div class="msg-text">Hello! I'm your voice assistant for Pete's Inn. Press the mic and ask me anything.</div>
    </div>
  </div>
  <div id="interim"></div>
  <canvas id="waveform"></canvas>
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Press mic to start</span>
  </div>
  <div id="controls">
    <button id="mic-btn" onclick="toggleMic()">
      <div class="ring"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
  </div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────
let ws          = null;
let mediaStream = null;
let processor   = null;
let audioCtx    = null;
let isListening = false;

// ── Streaming audio playback with INSTANT stop capability ─────────
let playCtx       = null;
let activeSources = [];  // Track all active sources for instant stop
let nextStartTime = 0;
let playing       = false;

function getPlayCtx() {
  if (!playCtx || playCtx.state === 'closed') {
    playCtx = new AudioContext({ sampleRate: 24000 });
    nextStartTime = 0;
    activeSources = [];
  }
  return playCtx;
}

function stopAudio() {
  console.log('[AUDIO] Stopping immediately - killing all sources');
  
  // Stop all currently playing/scheduled sources IMMEDIATELY
  activeSources.forEach(src => {
    try {
      src.stop();
      src.disconnect();
    } catch (e) {
      // Already stopped/disconnected
    }
  });
  activeSources = [];
  
  // Close and recreate context for clean slate
  if (playCtx && playCtx.state !== 'closed') {
    playCtx.close().catch(() => {});
    playCtx = null;
  }
  
  nextStartTime = 0;
  playing = false;
  console.log('[AUDIO] Stop complete');
}

function scheduleChunk(pcmBytes) {
  if (!playing) {
    console.log('[AUDIO] Not playing, skipping chunk');
    return;
  }
  
  const ctx = getPlayCtx();
  const int16 = new Int16Array(pcmBytes);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

  const buf = ctx.createBuffer(1, float32.length, 24000);
  buf.copyToChannel(float32, 0);

  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);

  // Track this source so we can stop it on barge-in
  activeSources.push(src);
  
  // Remove from tracking when it ends naturally
  src.onended = () => {
    const idx = activeSources.indexOf(src);
    if (idx > -1) activeSources.splice(idx, 1);
  };

  // Schedule back-to-back
  const now = ctx.currentTime;
  if (nextStartTime < now) nextStartTime = now + 0.02;
  src.start(nextStartTime);
  nextStartTime += buf.duration;
}

// ── WebSocket ──────────────────────────────────────────────────────
function connectWS() {
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${window.location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onopen  = () => { 
    setStatus('listening', 'Listening...'); 
    document.getElementById('mic-btn').classList.add('active'); 
  };
  
  ws.onclose = () => { 
    setStatus('idle', 'Disconnected'); 
    document.getElementById('mic-btn').classList.remove('active'); 
    isListening = false; 
    stopAudio(); 
  };
  
  ws.onerror = () => { 
    setStatus('idle', 'Connection error — is the server running?'); 
  };

  ws.onmessage = (event) => {
    // Binary = PCM audio chunk → schedule immediately
    if (event.data instanceof ArrayBuffer) {
      if (playing) {
        scheduleChunk(event.data);
      }
      return;
    }

    const msg = JSON.parse(event.data);

    if (msg.type === 'interim') {
      document.getElementById('interim').textContent = msg.text;
    }
    else if (msg.type === 'transcript') {
      document.getElementById('interim').textContent = '';
      addMessage('you', msg.text);
    }
    else if (msg.type === 'thinking') {
      setStatus('thinking', 'Thinking...');
    }
    else if (msg.type === 'response') {
      addMessage('bot', msg.text);
    }
    else if (msg.type === 'audio_start') {
      // Prepare for streaming audio - clear any previous
      stopAudio();
      playing = true;
      setStatus('speaking', 'Speaking...');
      console.log('[AUDIO] Started receiving audio');
    }
    else if (msg.type === 'audio_end') {
      // Natural end of speech
      playing = false;
      console.log('[AUDIO] Received audio_end signal');
      
      // Wait for any scheduled audio to finish, then update status
      const ctx = playCtx;
      if (ctx && nextStartTime > ctx.currentTime) {
        const remaining = nextStartTime - ctx.currentTime;
        setTimeout(() => {
          if (!playing) {  // Only update if we haven't started new audio
            setStatus('listening', 'Listening...');
          }
        }, remaining * 1000 + 100);
      } else {
        setStatus('listening', 'Listening...');
      }
    }
    else if (msg.type === 'barge_in') {
      // CRITICAL: Stop audio IMMEDIATELY on barge-in
      console.log('[BARGE-IN] Received - stopping audio NOW');
      playing = false;
      stopAudio();  // This kills all scheduled audio instantly
      setStatus('listening', 'Listening...');
      document.getElementById('interim').textContent = '';
    }
  };
}

// ── Mic ────────────────────────────────────────────────────────────
async function toggleMic() {
  if (isListening) { stopMic(); } else { await startMic(); }
}

async function startMic() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ 
      audio: {
        sampleRate: 16000, 
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      }
    });

    audioCtx  = new AudioContext({ sampleRate: 16000 });
    const src = audioCtx.createMediaStreamSource(mediaStream);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const float32 = e.inputBuffer.getChannelData(0);
      const int16   = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32767));
      }
      ws.send(int16.buffer);
    };

    src.connect(processor);
    processor.connect(audioCtx.destination);
    isListening = true;
    connectWS();
    startWaveform(mediaStream);
  } catch (error) {
    console.error('[MIC] Error starting microphone:', error);
    setStatus('idle', 'Microphone access denied');
  }
}

function stopMic() {
  if (processor)   { processor.disconnect(); processor = null; }
  if (audioCtx)    { audioCtx.close(); audioCtx = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); }
  if (ws)          { ws.close(); ws = null; }
  stopAudio();
  isListening = false;
  document.getElementById('mic-btn').classList.remove('active');
  setStatus('idle', 'Press mic to start');
}

// ── Waveform ───────────────────────────────────────────────────────
function startWaveform(stream) {
  const canvas   = document.getElementById('waveform');
  const ctx      = canvas.getContext('2d');
  const ac       = new AudioContext();
  const analyser = ac.createAnalyser();
  analyser.fftSize = 512;
  ac.createMediaStreamSource(stream).connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  
  function draw() {
    if (!isListening) return;
    requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(data);
    canvas.width = canvas.offsetWidth;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#4a9eff44';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const step = canvas.width / data.length;
    for (let i = 0; i < data.length; i++) {
      const y = (data[i] / 128.0) * (canvas.height / 2);
      i === 0 ? ctx.moveTo(0, y) : ctx.lineTo(i * step, y);
    }
    ctx.stroke();
  }
  draw();
}

// ── UI ─────────────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = '';
  if (state !== 'idle') dot.classList.add(state);
  document.getElementById('status-text').textContent = text;
}

function addMessage(role, text) {
  const conv = document.getElementById('conversation');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-label">${role === 'you' ? 'You' : 'Assistant'}</div><div class="msg-text">${text}</div>`;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}
</script>
</body>
</html>
